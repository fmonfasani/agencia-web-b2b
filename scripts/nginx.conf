# ========================================
# NGINX CONFIG - PRODUCTION
# Para usar en Hetzner con SSL (Let's Encrypt)
# ========================================

upstream backend_saas {
    server localhost:8000;
    keepalive 32;
}

upstream backend_agents {
    server localhost:8001;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name tudominio.com www.tudominio.com api.tudominio.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS - SaaS API
server {
    listen 443 ssl http2;
    server_name api.tudominio.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/webshooks-saas-access.log;
    error_log /var/log/nginx/webshooks-saas-error.log;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=saas_limit:10m rate=10r/s;
    limit_req zone=saas_limit burst=20 nodelay;

    location / {
        proxy_pass http://backend_saas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Static files (si hay)
    location /static/ {
        alias /var/www/webshooks/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS - Agent Engine API
server {
    listen 443 ssl http2;
    server_name agents.tudominio.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Logging
    access_log /var/log/nginx/webshooks-agents-access.log;
    error_log /var/log/nginx/webshooks-agents-error.log;

    # Rate limiting (más estricto para agentes)
    limit_req_zone $binary_remote_addr zone=agents_limit:10m rate=20r/s;
    limit_req zone=agents_limit burst=40 nodelay;

    location / {
        proxy_pass http://backend_agents;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

