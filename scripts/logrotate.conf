# Logrotate configuration for Webshooks Docker containers
# Install to: /etc/logrotate.d/webshooks

/var/lib/docker/containers/*/*.log {
    rotate 7
    daily
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 640 root root
    sharedscripts
    postrotate
        docker logs --tail 100 agencia_backend_saas > /var/log/webshooks/saas-$(date +%Y%m%d).log 2>&1 || true
        docker logs --tail 100 agencia_backend_agents > /var/log/webshooks/agents-$(date +%Y%m%d).log 2>&1 || true
    endscript
}

# Logs de aplicación (dentro de contenedores, montados como volúmenes)
/opt/webshooks/logs/*.log {
    rotate 30
    daily
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 644 root root
    size 100M
}
