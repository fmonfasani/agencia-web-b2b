version: '3.8'

services:
  # Base de datos PostgreSQL
  # ⚠️ IMPORTANTE: Si ya tenés multidb-postgres corriendo, NO ejecutes este servicio
  # Comentá o eliminá esta sección si usás la DB existente
  db:
    image: postgres:16-alpine
    container_name: agencia-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cambiar_password}
      POSTGRES_DB: agencia_web_b2b
    # No exponer puerto públicamente - usar docker exec si necesitas acceder
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agencia_web_b2b"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    profiles:
      - init  # Solo para inicializar, luego deshabilitar

  # Frontend Next.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: agencia-frontend
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  # Agent Service (FastAPI/Python)
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: agencia-agents
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    volumes:
      - ./agent-service/widget:/app/widget
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
