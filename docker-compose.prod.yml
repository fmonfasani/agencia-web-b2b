version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: agencia-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cambiar_password}
      POSTGRES_DB: agencia_web_b2b
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agencia_web_b2b"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agencia-qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - app-network

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SAAS_API_URL: ${NEXT_PUBLIC_SAAS_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_AGENT_API_URL: ${NEXT_PUBLIC_AGENT_API_URL:-http://localhost:8001}
    container_name: agencia-frontend
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ./frontend/.env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  # Backend SaaS (Auth, Onboarding, LangGraph)
  backend-saas:
    build:
      context: ./backend-saas
      dockerfile: Dockerfile
    container_name: agencia-backend-saas
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend-saas/.env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  # Agent Service (Scrapers, Chat, Widget)
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: agencia-agent-service
    ports:
      - "127.0.0.1:8001:8000" # Mapeado a 8001 en host para evitar conflicto con saas
    env_file:
      - ./agent-service/.env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    volumes:
      - ./agent-service/widget:/app/widget
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  qdrant_storage:
