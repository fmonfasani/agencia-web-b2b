name: CI - Real Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agencia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # Ollama no tiene imagen oficial liviana para CI — se instala directo
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull nomic-embed-text
          ollama pull qwen2.5:0.5b

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx psycopg2-binary qdrant-client

      - name: Start backend
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agencia_test

      - name: Run embedding tests
        run: pytest backend/tests/test_embeddings.py -v

      - name: Run RAG tests
        run: pytest backend/tests/test_rag_real.py -v

      - name: Run agent E2E tests
        run: pytest backend/tests/test_agent_e2e.py -v
        env:
          TEST_DB_DSN: postgresql://postgres:postgres@localhost:5432/agencia_test
