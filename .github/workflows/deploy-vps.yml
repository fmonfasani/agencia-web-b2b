name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "Strategy/**"

jobs:
  # ===========================================
  # Job 1: Quality Check (non-blocking)
  # ===========================================
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck || echo "TypeScript errors found (non-blocking)"

      - name: Lint
        run: npm run lint || echo "ESLint warnings found (non-blocking)"

  # ===========================================
  # Job 2: Build and Deploy
  # ===========================================
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate Prisma
        run: npx prisma generate

      - name: Build app
        run: npm run build:ci

      - name: Create artifact
        run: |
          tar -czf app.tar.gz \
            .next \
            public \
            package.json \
            package-lock.json \
            node_modules \
            prisma

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app.tar.gz"
          target: "/root/apps/agencia"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: "10m"
          script: |
            set -e
            cd /root/apps/agencia
            
            # Backup actual build
            [ -d .next ] && mv .next .next.bak || true
            
            # Extraer nuevo build
            tar -xzf app.tar.gz
            
            # Instalar deps prod
            npm install --production --omit=dev
            
            # Copiar .env si no existe
            if [ ! -f .env ] && [ -f /root/agencia-web-b2b/.env ]; then
              cp /root/agencia-web-b2b/.env .env
            fi
            
            # Restart
            pm2 delete agencia-web || true
            pm2 start ecosystem.config.js
            pm2 save
            pm2 describe agencia-web || true
            
            echo "=== Deploy completed ==="
