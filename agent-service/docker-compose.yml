services:
  agent-service:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    volumes:
      - ./widget:/app/widget
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
